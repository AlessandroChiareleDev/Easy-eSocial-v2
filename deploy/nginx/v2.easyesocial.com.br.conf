# /etc/nginx/sites-available/v2.easyesocial.com.br
#
# Subdomain V2 — paralelo ao V1 (easyesocial.com.br continua intacto).
# Backend FastAPI :8001 (systemd: easy-esocial.service).
# Frontend Vue: dist/ servido estático.
#
# Ativar:
#   ln -s /etc/nginx/sites-available/v2.easyesocial.com.br /etc/nginx/sites-enabled/
#   certbot --nginx -d v2.easyesocial.com.br
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name v2.easyesocial.com.br;

    # Certbot ACME
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Resto -> HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name v2.easyesocial.com.br;

    ssl_certificate     /etc/letsencrypt/live/v2.easyesocial.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v2.easyesocial.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP simples — mesmo origem; relaxar se precisar usar CDN
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'" always;

    # Uploads de XLSX/ZIP grandes
    client_max_body_size 200M;
    client_body_timeout  600s;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # Frontend (Vue build)
    root /opt/easy-esocial/frontend-dist;
    index index.html;

    # Cache agressivo pra assets com hash
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → uvicorn :8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/v2.easyesocial.access.log;
    error_log  /var/log/nginx/v2.easyesocial.error.log;
}
