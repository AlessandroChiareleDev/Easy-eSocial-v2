# Limites globais para upload de ZIPs grandes do eSocial.
# Carregado via /etc/nginx/conf.d/ (contexto http) — vence o default
# do nginx (1 MB) e qualquer outro server block que não tenha override.
client_max_body_size 2G;
client_body_timeout  1800s;
proxy_read_timeout   1800s;
proxy_send_timeout   1800s;
